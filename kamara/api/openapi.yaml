openapi: 3.1.0
info:
  title: Kamara storage API
  version: 0.1.0
  description: >
    The v0 storage API for Kamara, the per-tenant file store. The primary
    consumer is another app (Ergonomos attaches a file to a task) rather
    than a human; a browser upload UI is the second client (M4b).

    Every call is authenticated with a bearer token issued by the tenant's
    OIDC provider and validated against its userinfo endpoint; the caller's
    subject (the `sub` claim) becomes the file's owner. Authorization is
    OpenFGA's: a file has an `owner` relation, checked on read/delete and
    used to permission-filter the listing. Object identity is a UUIDv7 that
    URLs carry (ADR-0007); a rename never changes a file's URL.

    Upload is a single streaming request in v0 — the server chunks the body
    content-defined as it arrives. Resumable/ranged transfer (the
    session-vs-content-range protocol) is deferred to M4b; see kamara/SPEC.md.
servers:
  - url: /v1
security:
  - bearerAuth: []
paths:
  /files:
    get:
      operationId: listFiles
      summary: List the caller's files (permission-filtered via OpenFGA).
      responses:
        "200":
          description: The files the caller owns.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileList"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: uploadFile
      summary: >
        Upload a file. The raw request body is the content; the server
        content-defined-chunks, deduplicates, encrypts at rest, and records
        the object. The uploader (bearer subject) becomes the owner.
      parameters:
        - name: name
          in: query
          required: true
          description: The file's display name.
          schema: { type: string, minLength: 1 }
        - name: folder
          in: query
          required: false
          description: Destination folder id; omit for the owner's root.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "201":
          description: The stored file's metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { $ref: "#/components/responses/TooLarge" }
  /files/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getFile
      summary: Get a file's metadata.
      responses:
        "200":
          description: File metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteFile
      summary: Delete a file and reclaim its now-orphaned chunks.
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /files/{id}/content:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: downloadFile
      summary: Stream a file's content (reassembled from its chunks).
      responses:
        "200":
          description: The file bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: updateFileContent
      summary: >
        Replace a file's content. The raw request body becomes a new version;
        the file keeps its identity, owner, and URL (ADR-0007), and prior
        versions remain listed under /files/{id}/versions.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: The file's metadata after the write.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/File" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "413": { $ref: "#/components/responses/TooLarge" }
  /files/{id}/versions:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listFileVersions
      summary: List a file's versions, newest first.
      responses:
        "200":
          description: The file's versions.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /files/{id}/rename:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      operationId: renameFile
      summary: Rename a file (identity/URL unchanged — ADR-0007).
      requestBody: { $ref: "#/components/requestBodies/Name" }
      responses:
        "204": { description: Renamed. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /files/{id}/move:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      operationId: moveFile
      summary: Move a file to another folder (null = root).
      requestBody: { $ref: "#/components/requestBodies/MoveFile" }
      responses:
        "204": { description: Moved. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /folders:
    get:
      operationId: listChildren
      summary: List the folders and files directly under a parent (omit for root).
      parameters:
        - name: parent
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: The parent's child folders and files.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Listing" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: createFolder
      summary: Create a folder under a parent (omit for root).
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: parent
          in: query
          required: false
          schema: { type: string }
      responses:
        "201":
          description: The created folder.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Folder" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /folders/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      operationId: getFolder
      summary: Get a folder's metadata.
      responses:
        "200":
          description: Folder metadata.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Folder" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteFolder
      summary: >
        Delete a folder — empty-first by default (Kamara ADR-0002); with
        recursive=true the whole subtree (subfolders, files, versions) is
        removed in one transaction.
      parameters:
        - name: recursive
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /folders/{id}/zip:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      operationId: downloadFolderZip
      summary: >
        Stream the folder's subtree as a zip archive. Entries are written as
        the tree is walked — the download starts immediately, with no size
        precomputation; empty folders survive as directory entries.
      responses:
        "200":
          description: The zip archive, named after the folder.
          content:
            application/zip:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /folders/{id}/rename:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      operationId: renameFolder
      summary: Rename a folder.
      requestBody: { $ref: "#/components/requestBodies/Name" }
      responses:
        "204": { description: Renamed. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /folders/{id}/move:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      operationId: moveFolder
      summary: Move a folder under another parent (null = root); rejects cycles.
      requestBody: { $ref: "#/components/requestBodies/MoveFolder" }
      responses:
        "204": { description: Moved. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  requestBodies:
    Name:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name]
            properties:
              name: { type: string, minLength: 1 }
    MoveFile:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              folder: { type: [string, "null"], description: Destination folder id; null = root. }
    MoveFolder:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              parent: { type: [string, "null"], description: Destination parent id; null = root. }
  responses:
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Authenticated but not authorized on this object.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: No such object.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    TooLarge:
      description: The upload exceeds the maximum size.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: The operation conflicts with current state (e.g. folder not empty).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    File:
      type: object
      required: [id, name, size, folder, contentType, permalink, created, updated]
      properties:
        id: { type: string, description: UUIDv7 identity. }
        name: { type: string }
        size: { type: integer, format: int64, description: Bytes. }
        folder: { type: [string, "null"], description: Containing folder id; null = root. }
        contentType: { type: string, description: MIME type inferred from the name; empty when unknown. }
        permalink: { type: string, description: Canonical URL path. }
        created: { type: string, format: date-time }
        updated: { type: string, format: date-time }
    Version:
      type: object
      required: [id, ordinal, size, created]
      properties:
        id: { type: string, description: UUIDv7 identity. }
        ordinal: { type: integer, description: Monotonic revision number (0 = the initial upload). }
        size: { type: integer, format: int64, description: Bytes. }
        created: { type: string, format: date-time }
    VersionList:
      type: object
      required: [versions]
      properties:
        versions:
          type: array
          items: { $ref: "#/components/schemas/Version" }
    Folder:
      type: object
      required: [id, name, parent, permalink, created, updated]
      properties:
        id: { type: string, description: UUIDv7 identity. }
        name: { type: string }
        parent: { type: [string, "null"], description: Parent folder id; null = root. }
        permalink: { type: string, description: Canonical URL path. }
        created: { type: string, format: date-time }
        updated: { type: string, format: date-time }
    Listing:
      type: object
      required: [folders, files]
      properties:
        folders:
          type: array
          items: { $ref: "#/components/schemas/Folder" }
        files:
          type: array
          items: { $ref: "#/components/schemas/File" }
    FileList:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items: { $ref: "#/components/schemas/File" }
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
