# Platform OpenFGA for operator authorization (ADR-0019), cloud twin of
# control-plane/deploy/manifests/cp-openfga.yaml. The only difference: the
# `cp-openfga-authn-key` secret is NOT defined here — it's synced from Scaleway
# Secret Manager by ESO (deploy/scaleway/manifests/eso.yaml), so the preshared
# token is generated, not a committed literal. In-memory datastore; tuples are
# re-seeded on every control-plane restart, so no persistence needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cp-openfga
  namespace: peristera-system
  labels: { app.kubernetes.io/name: cp-openfga }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: cp-openfga } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cp-openfga }
    spec:
      containers:
        - name: openfga
          image: openfga/openfga:v1.8.0
          args: ["run"]
          env:
            - { name: OPENFGA_AUTHN_METHOD, value: preshared }
            - name: OPENFGA_AUTHN_PRESHARED_KEYS
              valueFrom:
                secretKeyRef: { name: cp-openfga-authn-key, key: token }
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 8081 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: cp-openfga
  namespace: peristera-system
spec:
  selector: { app.kubernetes.io/name: cp-openfga }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cp-openfga
  namespace: peristera-system
spec:
  podSelector: { matchLabels: { app.kubernetes.io/name: cp-openfga } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app.kubernetes.io/name: control-plane } }
      ports:
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 8081 }
