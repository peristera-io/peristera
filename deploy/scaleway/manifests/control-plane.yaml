# Control plane on the cloud node: the twin of
# control-plane/deploy/manifests/control-plane.yaml, differing only where the
# public deploy differs — the image is pulled from ghcr (not k3d-imported), and
# every URL is https on the real domain (${DOMAIN}, ${IMAGE_TAG} substituted at
# bootstrap). RBAC is identical (narrowed secret access per ADR-0007 #7).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: peristera-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: peristera-control-plane
rules:
  - apiGroups: ["peristera.io"]
    resources: ["tenants", "tenants/status", "tenants/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"] # NO list/watch (ADR-0007 #7)
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "databases", "scheduledbackups"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # update: the optional-app reconcile rolls Kamara's Deployment env on an
  # office toggle (R93/#47); create/delete cover provisioning + teardown.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # networkpolicies also update: the office toggle rewrites np-kamara's caller
  # set (R93/#47). ingresses are only ever created or deleted.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # (No cert-manager RBAC: DNS-01 issuance (ADR-0021) retired the healTenantCerts
  # self-heal; cert-manager's ingress-shim owns the per-host certs, now solved
  # via the Scaleway DNS-01 webhook — no external-dns race, so no sweep needed.)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: peristera-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: peristera-control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: peristera-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-leases
  namespace: peristera-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-leases
  namespace: peristera-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-leases
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: peristera-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: peristera-system
  labels: { app.kubernetes.io/name: control-plane }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: control-plane }
  template:
    metadata:
      labels: { app.kubernetes.io/name: control-plane }
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: ghcr.io/peristera-io/control-plane:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - { name: SYSTEM_USER_KEY, value: /secrets/admin-client/tls.key }
            - { name: ZITADEL_BASE_URL, value: "https://iam.${DOMAIN}" }
            - { name: ZITADEL_EXTERNAL_DOMAIN, value: "iam.${DOMAIN}" }
            - { name: TENANT_BASE_DOMAIN, value: "${DOMAIN}" }
            # https on the standard port: publicURL omits :443, so tenant URLs
            # are https://<app>.<tenant>.${DOMAIN} with no port suffix.
            - { name: TENANT_SCHEME, value: "https" }
            - { name: TENANT_EXTERNAL_PORT, value: "443" }
            # Per-host tenant certs (s2): the reconciler annotates tenant issuer
            # + app ingresses for this cert-manager ClusterIssuer.
            - { name: TENANT_TLS_ISSUER, value: "letsencrypt-prod" }
            - { name: TENANT_TLS_ISSUER_HTTP01, value: "letsencrypt-http01" }
            # Our own app images are pulled from ghcr on the cloud (imageFor).
            - { name: IMAGE_PREFIX, value: "ghcr.io/peristera-io/" }
            - { name: IMAGE_TAG, value: "${IMAGE_TAG}" }
            - { name: CP_LISTEN_ADDR, value: ":8090" }
            - { name: CP_PUBLIC_URL, value: "https://cp.${DOMAIN}" }
            - { name: OPENFGA_API_URL, value: "http://cp-openfga.peristera-system.svc.cluster.local:8080" }
            - name: OPENFGA_API_TOKEN
              valueFrom:
                secretKeyRef: { name: cp-openfga-authn-key, key: token }
            # Per-tenant Postgres backups to Object Storage (R85); the S3 creds
            # are the SCW keys from scaleway-secret.
            - { name: BACKUP_BUCKET, value: "${BACKUPS_BUCKET}" }
            - { name: BACKUP_ENDPOINT, value: "https://s3.${SCW_REGION}.scw.cloud" }
            - name: BACKUP_S3_KEY_ID
              valueFrom:
                secretKeyRef: { name: scaleway-secret, key: SCW_ACCESS_KEY }
            - name: BACKUP_S3_SECRET
              valueFrom:
                secretKeyRef: { name: scaleway-secret, key: SCW_SECRET_KEY }
            # Seeded by bootstrap.sh once Zitadel's iam-admin sub is resolved.
            - { name: OPERATOR_SUBJECTS, value: "" }
          volumeMounts:
            - { name: admin-client, mountPath: /secrets/admin-client, readOnly: true }
          readinessProbe:
            httpGet: { path: /healthz, port: 8090 }
      volumes:
        - name: admin-client
          secret:
            secretName: admin-client-tls
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: peristera-system
spec:
  selector: { app.kubernetes.io/name: control-plane }
  ports:
    - { port: 80, targetPort: 8090 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane
  namespace: peristera-system
  annotations:
    # No router.priority here (unlike dev): on the public domain nothing else
    # claims cp.<domain>, and a high priority would capture the ACME HTTP-01
    # challenge path (/.well-known/acme-challenge/*) before cert-manager's
    # solver, blocking issuance. Dev needs it only to outrank Zitadel's
    # *.sslip.io wildcard, which does not exist here.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - cp.${DOMAIN}
      secretName: control-plane-tls
  rules:
    - host: cp.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: control-plane
                port: { number: 80 }
