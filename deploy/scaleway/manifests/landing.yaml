# The public "what/why" landing page at ${LANDING_DOMAIN} (peristera.io), served
# by a tiny nginx from a ConfigMap holding landing/index.html — no custom image,
# no build. Its own namespace (it is not platform infrastructure). external-dns
# publishes the record and cert-manager issues the per-host cert, same as any
# tenant host. The ConfigMap `landing-html` is created by bootstrap.sh from the
# repo's landing/index.html.
apiVersion: v1
kind: Namespace
metadata:
  name: landing
  labels:
    app.kubernetes.io/managed-by: peristera
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: landing
  labels: { app.kubernetes.io/name: landing }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: landing } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: landing }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet: { path: /, port: 80 }
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits: { cpu: "100m", memory: "64Mi" }
      volumes:
        - name: html
          configMap:
            name: landing-html
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: landing
spec:
  selector: { app.kubernetes.io/name: landing }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing
  namespace: landing
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ${LANDING_DOMAIN}
        - www.${LANDING_DOMAIN}
      secretName: landing-tls
  rules:
    - host: ${LANDING_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: landing, port: { number: 80 } }
    - host: www.${LANDING_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: landing, port: { number: 80 } }
