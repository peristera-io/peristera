# Platform secret escrow (#77): a nightly age-encrypted copy of the three
# platform Secrets a restore needs — zitadel-masterkey (the restored Zitadel
# DB is unreadable without it), admin-client-tls (the system-user key whose
# public half is registered inside that DB), and cp-openfga-authn-key (token
# continuity for the platform OpenFGA). Their PRIMARY custody is Scaleway
# Secret Manager (Terraform-generated, ESO-synced — secrets.tf), which
# already survives node loss; this is the second chain, covering loss of the
# tofu state / Secret Manager under a different key (the age recipient) in a
# different store (the backups bucket). The per-tenant DEK escrow in the
# blob-backup jobs is the load-bearing one — DEKs exist nowhere outside the
# cluster. Same image and posture as those jobs: inputs are mounted, not read
# via the API (no ServiceAccount token, no RBAC), encrypted to the
# ${BACKUP_AGE_RECIPIENT} public key — the private key lives OUTSIDE the
# cluster, in the operator's password manager.
# Restore: age -d -i <key> secrets.tar.gz.age | tar xz.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-secret-escrow
  namespace: peristera-system
  labels: { app.kubernetes.io/name: platform-secret-escrow }
spec:
  # After the 03:00 CNPG base backups and the 03:30 tenant blob jobs.
  schedule: "45 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      # A wedged transfer must not wedge the schedule: Forbid skips later
      # runs while a Job is active, so cap it (the escrow is kilobytes).
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: escrow
              image: ghcr.io/peristera-io/backup:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              env:
                - { name: BACKUP_BUCKET, value: "${BACKUPS_BUCKET}" }
                - { name: BACKUP_PREFIX, value: "platform" }
                - { name: BACKUP_ENDPOINT, value: "https://s3.${SCW_REGION}.scw.cloud" }
                - { name: BACKUP_REGION, value: "${SCW_REGION}" }
                - { name: ESCROW_DIR, value: "/mnt/escrow" }
                - { name: AGE_RECIPIENT, value: "${BACKUP_AGE_RECIPIENT}" }
                - { name: HEARTBEAT_URL, value: "${BACKUP_HEARTBEAT_URL}" }
                - { name: HOME, value: "/tmp" }
                - name: ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef: { name: scaleway-secret, key: SCW_ACCESS_KEY }
                - name: ACCESS_SECRET_KEY
                  valueFrom:
                    secretKeyRef: { name: scaleway-secret, key: SCW_SECRET_KEY }
              volumeMounts:
                - { name: zitadel-masterkey, mountPath: /mnt/escrow/zitadel-masterkey, readOnly: true }
                - { name: admin-client-tls, mountPath: /mnt/escrow/admin-client-tls, readOnly: true }
                - { name: cp-openfga-authn-key, mountPath: /mnt/escrow/cp-openfga-authn-key, readOnly: true }
                - { name: tmp, mountPath: /tmp }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: { drop: ["ALL"] }
          volumes:
            - name: zitadel-masterkey
              secret: { secretName: zitadel-masterkey }
            - name: admin-client-tls
              secret: { secretName: admin-client-tls }
            - name: cp-openfga-authn-key
              secret: { secretName: cp-openfga-authn-key }
            - name: tmp
              emptyDir: {}
