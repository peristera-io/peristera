# Let's Encrypt via DNS-01, solved through the Scaleway DNS API (ADR-0021, R90).
# This replaces the earlier HTTP-01 solver: DNS-01 needs no public A record or
# HTTP reachability at challenge time, which structurally eliminates the
# external-dns first-issue race (#52) — no NXDOMAIN, no cert-manager backoff, so
# the healTenantCerts self-heal is retired. It also unlocks wildcards and works
# for custom domains via _acme-challenge CNAME delegation.
#
# Prerequisite (installed by bootstrap.sh): the Scaleway DNS-01 webhook
#   helm repo add scaleway https://helm.scw.cloud/
#   helm upgrade --install scaleway-certmanager-webhook \
#     scaleway/scaleway-certmanager-webhook -n cert-manager --wait
# and a `scaleway-secret` (SCW_ACCESS_KEY/SCW_SECRET_KEY) in the cert-manager
# namespace, where cert-manager resolves ClusterIssuer DNS-01 secret refs.
# ${LE_EMAIL} is the ACME account contact, injected at bootstrap.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${LE_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - dns01:
          webhook:
            groupName: acme.scaleway.com
            solverName: scaleway
            config:
              accessKeySecretRef:
                name: scaleway-secret
                key: SCW_ACCESS_KEY
              secretKeySecretRef:
                name: scaleway-secret
                key: SCW_SECRET_KEY
---
# HTTP-01 issuer for custom-domain hosts (ADR-0021 slice 3). A custom domain's
# DNS lives in a zone we don't control, so DNS-01 there needs _acme-challenge
# CNAME delegation; until that's set up, custom-domain app hosts validate over
# HTTP-01 — safe because the customer points their A record at us before
# provisioning, so there is no external-dns first-issue race (#52). The control
# plane selects this issuer for hosts not under the platform base
# (TENANT_TLS_ISSUER_HTTP01), and letsencrypt-prod (DNS-01) for platform hosts.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-http01
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${LE_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-http01-account
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
