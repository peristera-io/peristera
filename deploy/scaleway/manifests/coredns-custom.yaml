# In-cluster DNS override so pods resolve the platform's public hostnames to
# the cluster-internal Traefik instead of hairpinning out to the node's own
# Flexible IP (which Scaleway may not NAT-loopback). The control plane calls
# https://iam.${DOMAIN} (operator tokens, System API) and every tenant issuer
# https://<slug>.${DOMAIN} (DiscoveryAlive, app token validation) from inside
# the cluster — this keeps that traffic internal. Traefik still serves the real
# Let's Encrypt cert by SNI, so TLS validates.
#
# The regex rewrites the WHOLE ${DOMAIN} zone (cp, iam, and every tenant/app
# host) to Traefik in one rule — `answer auto` restores the original name in
# the response so callers still see the host they asked for. Cloud twin of
# iam/deploy/dev/coredns-sslip.yaml (dev rewrites *.sslip.io the same way). k3s
# imports `*.override` ConfigMap keys into the default CoreDNS server block; the
# rewrite plugin runs early in the chain regardless of textual position.
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  peristera.override: |
    rewrite name regex (.*)\.${DOMAIN} traefik.kube-system.svc.cluster.local answer auto
