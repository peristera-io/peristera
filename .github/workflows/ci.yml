name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown:
    name: markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !Q&A.md
            !node_modules/**

  go:
    name: go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: fmt, vet, build, test every module
        run: |
          set -eu
          for mod in $(find . -name go.mod -not -path "*/node_modules/*" | xargs -n1 dirname); do
            echo "== $mod"
            cd "$mod"
            unformatted=$(gofmt -l .)
            if [ -n "$unformatted" ]; then echo "gofmt needed: $unformatted"; exit 1; fi
            go vet ./...
            go build ./...
            go test ./...
            cd - >/dev/null
          done

  accessibility:
    name: accessibility (Ergonomos, WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Render the Ergonomos page
        working-directory: ergonomos
        run: go run ./cmd/a11y-render > /tmp/ergo-page.html
      - name: Install a11y checker
        working-directory: ergonomos/a11y
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run axe-core (WCAG 2.1 AA)
        working-directory: ergonomos/a11y
        run: node check.mjs /tmp/ergo-page.html

  accessibility-kamara:
    name: accessibility (Kamara, WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check the stylesheet is regenerated from the templates
        working-directory: kamara/web
        run: |
          npm ci
          npm run build
          git -C "$GITHUB_WORKSPACE" diff --exit-code kamara/internal/web/style.css \
            || { echo "::error::kamara/internal/web/style.css is stale — run 'npm run build' in kamara/web"; exit 1; }
      - name: Install a11y checker
        working-directory: kamara/a11y
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run axe-core (WCAG 2.1 AA) across UI states
        working-directory: kamara
        run: |
          for state in browse empty root long; do
            echo "== a11y: $state =="
            go run ./cmd/a11y-render "$state" > "/tmp/kamara-$state.html"
            node a11y/check.mjs "/tmp/kamara-$state.html"
          done

  e2e:
    name: e2e (godog on k3d)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: Bring up the full dev environment
        run: ./hack/dev-cluster.sh
      - name: Run the feature suite
        working-directory: control-plane
        run: |
          SYSTEM_USER_KEY="$GITHUB_WORKSPACE/.dev-secrets/admin-client.key" \
          CP_BASE_URL=http://cp.127.0.0.1.sslip.io:9080 \
          PERISTERA_E2E=1 go test -run TestFeatures -timeout 20m -v .
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl get tenants -o yaml || true
          kubectl logs deploy/control-plane -n peristera-system --tail=100 || true
          kubectl logs deploy/zitadel -n peristera-system --tail=50 || true

  links:
    name: link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --no-progress './**/*.md'
          fail: true
