name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/peristera-io/peristera/blob/main/CLA.md
          # Signatures are committed by the bot, so this branch must NOT be
          # protected — `main` is (PRs + required checks), which made every run
          # fail with "Could not create file: Changes must be made through a
          # pull request". `cla-signatures` is a dedicated unprotected branch.
          branch: cla-signatures
          allowlist: jlspielmann,*[bot]
