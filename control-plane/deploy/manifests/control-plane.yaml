# In-cluster control plane: ServiceAccount + least-privilege RBAC +
# Deployment + Service + Ingress. Dev values (image tag, domains, http)
# are opinionated for the k3d cluster; production overlays arrive with M6.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane
  namespace: peristera-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: peristera-control-plane
rules:
  - apiGroups: ["peristera.io"]
    resources: ["tenants", "tenants/status", "tenants/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secrets: get (per-name reads of CNPG creds + own secrets) and create
  # (per-tenant secrets). Deliberately NO list/watch — the SA must not be able
  # to enumerate every secret in the cluster (Zitadel masterkey, system-user
  # key, kube-system) (#7). The controller caches no Secrets and only Gets them
  # by name, so list/watch is unnecessary. A namespace-scoped model (per-tenant
  # Roles) is the fuller MSP-alpha fix.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "databases"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: peristera-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: peristera-control-plane
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: peristera-system
---
# Leader election leases (namespaced).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-leases
  namespace: peristera-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-leases
  namespace: peristera-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-leases
subjects:
  - kind: ServiceAccount
    name: control-plane
    namespace: peristera-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: peristera-system
  labels: {app.kubernetes.io/name: control-plane}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: control-plane}
  template:
    metadata:
      labels: {app.kubernetes.io/name: control-plane}
    spec:
      serviceAccountName: control-plane
      containers:
        - name: control-plane
          image: peristera-control-plane:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - {name: SYSTEM_USER_KEY, value: /secrets/admin-client/tls.key}
            - {name: ZITADEL_BASE_URL, value: "http://iam.127.0.0.1.sslip.io:9080"}
            - {name: TENANT_BASE_DOMAIN, value: "127.0.0.1.sslip.io"}
            - {name: TENANT_EXTERNAL_PORT, value: "9080"}
            - {name: ZITADEL_EXTERNAL_DOMAIN, value: "iam.127.0.0.1.sslip.io"}
            - {name: CP_LISTEN_ADDR, value: ":8090"}
            - {name: CP_PUBLIC_URL, value: "http://cp.127.0.0.1.sslip.io:9080"}
            # Operator authorization (ADR-0019): the platform OpenFGA + its key,
            # and the bootstrap operator subjects (Zitadel `sub`s in the default
            # instance). OPERATOR_SUBJECTS is set by hack/dev-cluster.sh from the
            # iam-admin user; an empty value locks everyone out.
            - {name: OPENFGA_API_URL, value: "http://cp-openfga.peristera-system.svc.cluster.local:8080"}
            - name: OPENFGA_API_TOKEN
              valueFrom:
                secretKeyRef: {name: cp-openfga-authn-key, key: token}
            - {name: OPERATOR_SUBJECTS, value: ""}
          volumeMounts:
            - {name: admin-client, mountPath: /secrets/admin-client, readOnly: true}
          readinessProbe:
            httpGet: {path: /healthz, port: 8090}
      volumes:
        - name: admin-client
          secret:
            secretName: admin-client-tls
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: peristera-system
spec:
  selector: {app.kubernetes.io/name: control-plane}
  ports:
    - {port: 80, targetPort: 8090}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane
  namespace: peristera-system
  annotations:
    # Must outrank Zitadel's *.127.0.0.1.sslip.io wildcard (tenant
    # issuers), which otherwise swallows this exact host.
    traefik.ingress.kubernetes.io/router.priority: "1000"
spec:
  ingressClassName: traefik
  rules:
    - host: cp.127.0.0.1.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: control-plane
                port: {number: 80}
