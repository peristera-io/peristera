---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: tenants.peristera.io
spec:
  group: peristera.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    shortNames:
    - tn
    singular: tenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.slug
      name: Slug
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.issuer
      name: Issuer
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tenant is one isolated customer environment.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TenantSpec is the desired state. Slug is immutable after creation
              (ADR-0007): it forms the tenant domain, which is the OIDC issuer and
              must never change.
            properties:
              apps:
                description: |-
                  Apps is the set of optional catalog apps this tenant has enabled
                  (ADR-0013 optional-per-tenant dimension, ADR-0018). Always-on apps are
                  provisioned regardless; an optional app (e.g. "office", the Collabora
                  engine) is provisioned only when named here, since it carries a real
                  hardware cost. Editing the list enables or disables the feature.
                items:
                  type: string
                type: array
              displayName:
                description: DisplayName may change freely; it never appears in URLs
                  or domains.
                type: string
              slug:
                description: |-
                  Slug is a DNS label: the permanent, human-chosen tenant identifier.
                  "iam" and "cp" are the platform's own hosts under the base domain
                  and therefore reserved.
                pattern: ^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$
                type: string
                x-kubernetes-validations:
                - message: slug is immutable
                  rule: self == oldSelf
                - message: slug is reserved
                  rule: '!(self in [''iam'', ''cp''])'
            required:
            - slug
            type: object
          status:
            description: TenantStatus is reported state, never edited by humans.
            properties:
              clientId:
                description: ClientID of the tenant's default PKCE app (ADR-0006 §6).
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              instanceId:
                description: |-
                  InstanceID of the tenant's Zitadel virtual instance — the
                  idempotency record for IAM provisioning and the handle for
                  off-boarding (ADR-0006).
                type: string
              issuer:
                description: Issuer is the tenant's OIDC issuer URL (its permanent
                  domain).
                type: string
              phase:
                description: TenantPhase summarizes where the reconcile loop stands.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
