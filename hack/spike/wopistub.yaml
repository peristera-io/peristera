apiVersion: apps/v1
kind: Deployment
metadata:
  name: stub
  namespace: collabora-spike
  labels: { app: stub }
spec:
  replicas: 1
  selector: { matchLabels: { app: stub } }
  template:
    metadata:
      labels: { app: stub }
    spec:
      containers:
        - name: stub
          image: wopistub:spike
          imagePullPolicy: Never
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: stub
  namespace: collabora-spike
spec:
  selector: { app: stub }
  ports: [{ port: 8080, targetPort: 8080 }]
