# Helm values for the shared Zitadel deployment on the local k3d cluster.
#   helm install zitadel zitadel/zitadel -n peristera-system -f zitadel-values.yaml
# Chart: zitadel/zitadel 10.x (app v4.x). See iam/README.md for the full
# dev-environment walkthrough.
zitadel:
  # DEV ONLY. The masterkey encrypts secrets at rest; production gets a
  # generated one via masterkeySecretName, never a committed literal.
  masterkey: "dev-only-peristera-m1-spike-key0"
  configmapConfig:
    # Wildcard DNS to 127.0.0.1 — the k3d loadbalancer maps host port 9080
    # to the cluster's Traefik ingress. Each tenant later gets its own
    # <tenant>.… domain (domain-per-tenant is a day-one rule).
    ExternalDomain: iam.127.0.0.1.sslip.io
    ExternalPort: 9080
    ExternalSecure: false
    TLS:
      Enabled: false
    # System API user for instance lifecycle (create/delete virtual
    # instances) — authenticates with a self-signed JWT (RS256) whose cert
    # lives in the admin-client-tls secret (created in iam/README.md).
    # This is the seam the control plane will use to provision tenants.
    SystemAPIUsers:
      admin-client:
        Path: /secrets/admin-client/tls.crt
        Memberships:
          # One System-type membership applies across all instances; the
          # roles list is what grants powers. SYSTEM_OWNER = System API
          # (instance lifecycle); IAM_OWNER = Admin/Management APIs inside
          # every instance (org/project/app/user provisioning). A separate
          # `MemberType: IAM` entry would need a per-instance AggregateID —
          # useless for provisioning arbitrary tenants. Gotcha: the JWT
          # audience is always the deployment's ExternalDomain issuer,
          # even when calling a tenant instance's APIs.
          - MemberType: System
            Roles:
              - SYSTEM_OWNER
              - IAM_OWNER

extraVolumes:
  - name: admin-client-cert
    secret:
      secretName: admin-client-tls
      items:
        - key: tls.crt
          path: tls.crt
extraVolumeMounts:
  - name: admin-client-cert
    mountPath: /secrets/admin-client
    readOnly: true

# Database DSN comes from the CNPG-generated credentials; the secret is
# created by the setup steps in iam/README.md (DSN mode, recommended by the
# chart over discrete configmap fields).
env:
  - name: ZITADEL_DATABASE_POSTGRES_DSN
    valueFrom:
      secretKeyRef:
        name: zitadel-db-dsn
        key: dsn

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: iam.127.0.0.1.sslip.io
      paths:
        - path: /
          pathType: Prefix
    # Tenant virtual instances: one domain per tenant (day-one rule).
    - host: "*.127.0.0.1.sslip.io"
      paths:
        - path: /
          pathType: Prefix

# Login v2 (the separate Next.js login app — accepted trade-off, Q&A R20).
login:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: iam.127.0.0.1.sslip.io
        paths:
          - path: /ui/v2/login
            pathType: Prefix
      - host: "*.127.0.0.1.sslip.io"
        paths:
          - path: /ui/v2/login
            pathType: Prefix
